<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Day 43 concept flow</title>
  <desc id="desc">A four-step concept flow for AI for Social Media: Repurposing Without Becoming a Content Factory Robot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="0.60" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M920 -70 C1080 40 1135 170 1240 310 L1240 -70 Z" fill="#06b6d4" opacity="0.20"/>
  <path d="M-50 520 C145 430 315 505 415 720 L-50 720 Z" fill="#f9f871" opacity="0.24"/>
  <rect x="55" y="55" width="1090" height="565" rx="30" fill="#ffffff" opacity="0.82" stroke="#ffffff" stroke-width="3"/>
  <rect x="90" y="88" width="220" height="42" rx="15" fill="#111827"/>
  <text x="114" y="116" font-family="Arial, sans-serif" font-size="21" font-weight="900" fill="#ffffff">DAY 43 FLOW</text>
  <text x="95" y="176" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#111827">AI Marketing</text>
  <text x="95" y="214" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#52606d">AI for Social Media: Repurposing Without Becoming a Content Factory Robot</text>
  <g font-family="Arial, sans-serif">
    <g filter="url(#shadow)">
      <rect x="90" y="288" width="230" height="132" rx="26" fill="#ffffff" stroke="#06b6d4" stroke-width="4"/>
    </g>
    <text x="121" y="322" font-size="24" font-weight="900" fill="#06b6d4">01</text>
<text x="205" y="350" text-anchor="middle" font-size="24" font-weight="900" fill="#111827">Audience</text>
    <text x="205" y="392" text-anchor="middle" font-size="18" font-weight="700" fill="#111827" opacity="0.78">start clear</text>
    <g filter="url(#shadow)">
      <rect x="355" y="288" width="230" height="132" rx="26" fill="#06b6d4" stroke="#06b6d4" stroke-width="4"/>
    </g>
    <text x="386" y="322" font-size="24" font-weight="900" fill="#ffffff">02</text>
<text x="470" y="350" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff">Message</text>
    <text x="470" y="392" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff" opacity="0.78">add context</text>
    <g filter="url(#shadow)">
      <rect x="620" y="288" width="230" height="132" rx="26" fill="#ffffff" stroke="#f9f871" stroke-width="4"/>
    </g>
    <text x="651" y="322" font-size="24" font-weight="900" fill="#06b6d4">03</text>
<text x="735" y="350" text-anchor="middle" font-size="24" font-weight="900" fill="#111827">Channel</text>
    <text x="735" y="392" text-anchor="middle" font-size="18" font-weight="700" fill="#111827" opacity="0.78">make it work</text>
    <g filter="url(#shadow)">
      <rect x="885" y="288" width="230" height="132" rx="26" fill="#111827" stroke="#111827" stroke-width="4"/>
    </g>
    <text x="916" y="322" font-size="24" font-weight="900" fill="#f9f871">04</text>
<text x="1000" y="350" text-anchor="middle" font-size="24" font-weight="900" fill="#ffffff">Measure</text>
    <text x="1000" y="392" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff" opacity="0.78">check reality</text>
    <path d="M323 354 H350" stroke="#111827" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
    <path d="M588 354 H615" stroke="#111827" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
    <path d="M853 354 H880" stroke="#111827" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  </g>
  <rect x="95" y="500" width="760" height="64" rx="20" fill="#111827"/>
  <text x="130" y="540" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff">Builder rule: validate before celebration.</text>
  <rect x="880" y="500" width="235" height="64" rx="20" fill="#f9f871"/>
  <text x="914" y="540" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#111827">signal &gt; hype</text>
