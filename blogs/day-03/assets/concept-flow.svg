<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Day 3 concept flow</title>
  <desc id="desc">A four-step concept flow for Why AI Suddenly Feels Everywhere in 2026.</desc>
  <rect width="1200" height="675" fill="#fff7ed"/>
  <rect x="55" y="55" width="1090" height="565" rx="28" fill="#ffffff" stroke="#ffedd5" stroke-width="3"/>
