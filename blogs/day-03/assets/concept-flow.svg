    <rect x="635" y="270" width="190" height="120" rx="22" fill="#ffedd5" stroke="#fb923c" stroke-width="3"/>
    <text x="730" y="320" text-anchor="middle" font-size="25" font-weight="800" fill="#c2410c">3. What changes</text>
