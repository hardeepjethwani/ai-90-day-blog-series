<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Training versus inference</title>
  <desc id="desc">Training adjusts weights using examples. Inference uses trained weights to answer a prompt.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="55" y="55" width="1090" height="565" rx="28" fill="#ffffff" stroke="#dbe4ef" stroke-width="2"/>
  <text x="95" y="118" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#111827">Flow 3: Training is not chatting</text>
  <text x="95" y="158" font-family="Arial, sans-serif" font-size="21" fill="#52606d">Your prompt gives temporary context. It does not send the model to college.</text>

  <rect x="95" y="220" width="460" height="325" rx="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="130" y="275" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#1e3a8a">Training</text>
  <text x="130" y="323" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">1. Read huge token datasets</text>
  <text x="130" y="363" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">2. Predict missing next tokens</text>
  <text x="130" y="403" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">3. Compare with real answer</text>
  <text x="130" y="443" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">4. Adjust weights</text>
  <text x="130" y="483" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">5. Repeat until compute cries</text>

  <rect x="645" y="220" width="460" height="325" rx="24" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="680" y="275" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#92400e">Inference</text>
  <text x="680" y="323" font-family="Arial, sans-serif" font-size="22" fill="#92400e">1. Receive your prompt</text>
  <text x="680" y="363" font-family="Arial, sans-serif" font-size="22" fill="#92400e">2. Use trained weights</text>
  <text x="680" y="403" font-family="Arial, sans-serif" font-size="22" fill="#92400e">3. Predict next tokens</text>
  <text x="680" y="443" font-family="Arial, sans-serif" font-size="22" fill="#92400e">4. Return an answer</text>
  <text x="680" y="483" font-family="Arial, sans-serif" font-size="22" fill="#92400e">5. Base model stays unchanged</text>

  <path d="M575 385 H625" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <path d="M625 385 l-15 -11 v22 z" fill="#64748b"/>
</svg>
