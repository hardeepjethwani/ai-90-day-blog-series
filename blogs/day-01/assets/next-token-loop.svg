<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Next token loop</title>
  <desc id="desc">The model predicts next-token probabilities, selects a token, appends it, and repeats.</desc>
  <rect width="1200" height="675" fill="#fffaf3"/>
  <rect x="55" y="55" width="1090" height="565" rx="28" fill="#ffffff" stroke="#eadfd0" stroke-width="2"/>
  <text x="95" y="118" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#111827">Flow 2: Predict, append, repeat</text>
  <text x="95" y="158" font-family="Arial, sans-serif" font-size="21" fill="#5f6470">This is the main trick. Autocomplete went to the gym and got VC funding.</text>

  <rect x="95" y="230" width="430" height="115" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="130" y="272" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Context so far</text>
  <text x="130" y="312" font-family="Arial, sans-serif" font-size="28" fill="#1e3a8a">The API failed because</text>
  <path d="M550 287 H660" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M660 287 l-14 -10 v20 z" fill="#64748b"/>

  <rect x="690" y="205" width="390" height="320" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="730" y="253" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">Possible next tokens</text>
  <g font-family="Arial, sans-serif" font-size="22" fill="#166534">
    <text x="730" y="315">the</text><rect x="850" y="293" width="165" height="28" rx="9" fill="#22c55e"/><text x="1035" y="315" text-anchor="end" font-weight="700">41%</text>
    <text x="730" y="365">auth</text><rect x="850" y="343" width="112" height="28" rx="9" fill="#86efac"/><text x="1035" y="365" text-anchor="end" font-weight="700">28%</text>
    <text x="730" y="415">timeout</text><rect x="850" y="393" width="76" height="28" rx="9" fill="#bbf7d0"/><text x="1035" y="415" text-anchor="end" font-weight="700">19%</text>
    <text x="730" y="465">banana</text><rect x="850" y="443" width="24" height="28" rx="9" fill="#dcfce7"/><text x="1035" y="465" text-anchor="end" font-weight="700">2%</text>
  </g>

  <rect x="95" y="465" width="470" height="90" rx="18" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="130" y="522" font-family="Arial, sans-serif" font-size="27" fill="#92400e">Chosen token: "the"</text>
  <path d="M585 510 H670" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M670 510 l-14 -10 v20 z" fill="#64748b"/>
  <text x="705" y="519" font-family="Arial, sans-serif" font-size="23" fill="#111827">Append it, then ask again.</text>
</svg>
