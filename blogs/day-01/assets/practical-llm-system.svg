<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Practical LLM system</title>
  <desc id="desc">A practical LLM application surrounds the model with prompt building, context, tools, validation, and human review.</desc>
  <rect width="1200" height="675" fill="#fbf8ff"/>
  <rect x="55" y="55" width="1090" height="565" rx="28" fill="#ffffff" stroke="#e2d8ef" stroke-width="2"/>
  <text x="95" y="118" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#111827">Flow 4: A practical LLM system</text>
  <text x="95" y="158" font-family="Arial, sans-serif" font-size="21" fill="#52606d">Do not just ask, pray, and ship. Ask, ground, generate, validate, then ship.</text>

  <g font-family="Arial, sans-serif">
    <rect x="95" y="260" width="145" height="90" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="168" y="297" text-anchor="middle" font-size="20" font-weight="800" fill="#1e3a8a">User</text>
    <text x="168" y="326" text-anchor="middle" font-size="17" fill="#1e3a8a">question</text>

    <rect x="290" y="260" width="170" height="90" rx="18" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
    <text x="375" y="297" text-anchor="middle" font-size="20" font-weight="800" fill="#065f46">Prompt</text>
    <text x="375" y="326" text-anchor="middle" font-size="17" fill="#065f46">builder</text>

    <rect x="510" y="195" width="170" height="90" rx="18" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
    <text x="595" y="232" text-anchor="middle" font-size="20" font-weight="800" fill="#92400e">Context</text>
    <text x="595" y="261" text-anchor="middle" font-size="17" fill="#92400e">docs/logs/data</text>

    <rect x="510" y="390" width="170" height="90" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="595" y="427" text-anchor="middle" font-size="20" font-weight="800" fill="#5b21b6">Tools</text>
    <text x="595" y="456" text-anchor="middle" font-size="17" fill="#5b21b6">APIs/tests</text>

    <rect x="730" y="260" width="170" height="90" rx="18" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2"/>
    <text x="815" y="297" text-anchor="middle" font-size="20" font-weight="800" fill="#3730a3">LLM</text>
    <text x="815" y="326" text-anchor="middle" font-size="17" fill="#3730a3">generation</text>

    <rect x="950" y="260" width="155" height="90" rx="18" fill="#fff1f2" stroke="#fda4af" stroke-width="2"/>
    <text x="1028" y="297" text-anchor="middle" font-size="20" font-weight="800" fill="#9f1239">Validate</text>
    <text x="1028" y="326" text-anchor="middle" font-size="17" fill="#9f1239">then publish</text>

    <path d="M240 305 H290" stroke="#64748b" stroke-width="4" stroke-linecap="round"/><path d="M290 305 l-13 -9 v18 z" fill="#64748b"/>
    <path d="M460 305 H730" stroke="#64748b" stroke-width="4" stroke-linecap="round"/><path d="M730 305 l-13 -9 v18 z" fill="#64748b"/>
    <path d="M900 305 H950" stroke="#64748b" stroke-width="4" stroke-linecap="round"/><path d="M950 305 l-13 -9 v18 z" fill="#64748b"/>
    <path d="M595 285 V305" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8"/>
    <path d="M595 390 V350" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8"/>
  </g>

  <rect x="95" y="535" width="700" height="60" rx="18" fill="#111827"/>
  <text x="130" y="573" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#ffffff">Model output is a draft. System design makes it dependable.</text>
</svg>
