<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">What Is an LLM hero graphic</title>
  <desc id="desc">A modern labeled hero graphic showing tokens entering neural layers and producing next-token probabilities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.48" stop-color="#f3fff8"/>
      <stop offset="1" stop-color="#fff8ee"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <circle cx="1180" cy="95" r="160" fill="#dbeafe" opacity="0.55"/>
  <circle cx="160" cy="680" r="210" fill="#ffedd5" opacity="0.55"/>
  <text x="70" y="98" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#111827">What Is an LLM?</text>
  <text x="73" y="145" font-family="Arial, sans-serif" font-size="25" fill="#475569">Tokens go in. Probabilities come out. The confusion takes the day off.</text>

  <g filter="url(#shadow)">
    <rect x="75" y="276" width="85" height="85" rx="22" fill="#8b5cf6"/>
    <rect x="181" y="276" width="85" height="85" rx="22" fill="#38bdf8"/>
    <rect x="287" y="276" width="85" height="85" rx="22" fill="#facc15"/>
    <rect x="393" y="276" width="85" height="85" rx="22" fill="#14b8a6"/>
    <rect x="499" y="276" width="85" height="85" rx="22" fill="#fb7185"/>
  </g>
  <text x="118" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Input</text>
  <text x="118" y="439" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">tokens</text>

  <path d="M620 318 H720" stroke="#64748b" stroke-width="10" stroke-linecap="round"/>
  <path d="M720 318 l-24 -17 v34 z" fill="#64748b"/>

  <g filter="url(#shadow)">
    <rect x="760" y="205" width="75" height="315" rx="24" fill="url(#blue)" opacity="0.82"/>
    <rect x="860" y="180" width="75" height="365" rx="24" fill="url(#green)" opacity="0.82"/>
    <rect x="960" y="205" width="75" height="315" rx="24" fill="url(#orange)" opacity="0.82"/>
    <g stroke="#ffffff" stroke-width="3" opacity="0.86">
      <path d="M797 250 L897 300 L997 255"/>
      <path d="M797 318 L897 248 L997 335"/>
      <path d="M797 410 L897 382 L997 450"/>
      <path d="M797 472 L897 486 L997 392"/>
    </g>
    <g fill="#ffffff">
      <circle cx="797" cy="250" r="8"/><circle cx="797" cy="318" r="8"/><circle cx="797" cy="410" r="8"/><circle cx="797" cy="472" r="8"/>
      <circle cx="897" cy="248" r="8"/><circle cx="897" cy="300" r="8"/><circle cx="897" cy="382" r="8"/><circle cx="897" cy="486" r="8"/>
      <circle cx="997" cy="255" r="8"/><circle cx="997" cy="335" r="8"/><circle cx="997" cy="392" r="8"/><circle cx="997" cy="450" r="8"/>
    </g>
  </g>
  <text x="900" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="800" fill="#111827">Neural layers</text>
  <text x="900" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#475569">A very expensive pattern blender</text>

  <path d="M1070 318 H1160" stroke="#64748b" stroke-width="10" stroke-linecap="round"/>
  <path d="M1160 318 l-24 -17 v34 z" fill="#64748b"/>

  <g filter="url(#shadow)">
    <rect x="1190" y="210" width="145" height="40" rx="14" fill="#8b5cf6"/>
    <rect x="1190" y="275" width="92" height="40" rx="14" fill="#38bdf8"/>
    <rect x="1190" y="340" width="120" height="40" rx="14" fill="#14b8a6"/>
    <rect x="1190" y="405" width="65" height="40" rx="14" fill="#fb7185"/>
    <rect x="1183" y="489" width="118" height="70" rx="22" fill="#f59e0b"/>
  </g>
  <text x="1185" y="614" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#111827">Next token</text>
  <text x="1185" y="646" font-family="Arial, sans-serif" font-size="20" fill="#475569">One tiny piece at a time</text>

  <rect x="70" y="635" width="720" height="78" rx="22" fill="#111827" opacity="0.94"/>
  <text x="102" y="684" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#ffffff">Mental model: LLM = autocomplete with a gym membership.</text>
</svg>
